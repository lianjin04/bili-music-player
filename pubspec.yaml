name: bili_music_player
description: 将B站个人收藏夹当歌单听歌 - 跨平台音乐播放器
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 音频播放
  just_audio: ^0.9.39

  # 网络请求
  dio: ^5.4.0

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # 状态管理
  flutter_riverpod: ^2.5.1

  # 图片缓存
  cached_network_image: ^3.3.1

  # Cookie安全存储
  flutter_secure_storage: ^9.0.0

  # 工具
  uuid: ^4.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
